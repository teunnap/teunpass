name: Run Pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Setup a PostgreSQL database container for the tests to run against
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: teunpass
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d teunpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/teunpass
        run: |
          alembic upgrade head
          
      - name: Run tests with Pytest
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/teunpass
        run: |
          pytest tests/